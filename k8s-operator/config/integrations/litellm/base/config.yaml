model_list:
  - model_name: model-default
    litellm_params:
      model: ${MODEL_PROVIDER}/${MODEL_DEFAULT_NAME}
  - model_name: text-embedding-3-small
    litellm_params:
      model: ${MODEL_PROVIDER}/${EMBEDDING_DEFAULT_NAME:-text-embedding-004}
litellm_settings:
  callbacks: ["otel", "prometheus"]

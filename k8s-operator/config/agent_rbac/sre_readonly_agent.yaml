apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubeagents-sre-readonly
  namespace: kubeagents-system
---
# ── Strict Read-Only K8s RBAC Roles for SRE Read-Only Agent ───────────────────
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: sre-readonly-agent-role
rules:
  - apiGroups: ["", "apps", "batch", "networking.k8s.io", "policy", "autoscaling", "storage.k8s.io", "apiextensions.k8s.io", "node.k8s.io"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["container.cnrm.cloud.google.com"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["kubeagents.x-k8s.io"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: sre-readonly-agent-rolebinding
subjects:
  - kind: ServiceAccount
    name: kubeagents-sre-readonly
    namespace: kubeagents-system
roleRef:
  kind: ClusterRole
  name: sre-readonly-agent-role
  apiGroup: rbac.authorization.k8s.io

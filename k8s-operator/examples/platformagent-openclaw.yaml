apiVersion: kubeagents.x-k8s.io/v1alpha1
kind: PlatformAgent
metadata:
  name: platformagent
  namespace: kubeagents-system
spec:
  # Harness configures the core execution environment and framework-level settings.
  # +optional
  harness:
    # ClusterName is the logical name of the cluster where the agent is running.
    # +optional
    clusterName: "cluster-a"
    # Location is the geographical location or cloud region.
    # +optional
    location: "us-central1-a"
    # Framework specifies which agent framework to run ("hermes" or "openclaw"). Defaults to "hermes".
    # +optional
    framework: "openclaw"
    # OpenClaw configures the internal event-routing or agent framework.
    # +optional
    openclaw:
      # AgentHome is the path to the agent's home directory.
      # +optional
      agentHome: "/opt/data"
      # GatewayTokenSecretRef securely references a Secret containing the gateway API token.
      # +optional
      gatewayTokenSecretRef:
        name: "platform-agent-secrets"
        key: "api-key"
  # Deployment abstracts the Kubernetes Pod/Deployment configuration,
  # decoupling the compute payload from the agent's application logic.
  # +optional
  deployment:
    image: "ghcr.io/gke-labs/kube-agents/platform-agent-openclaw"

    imagePullPolicy: "IfNotPresent"
  security:
    serviceAccountName: "kubeagents-platform-agent"
    # WorkloadIdentity maps external IAM to the KSA securely.
    # +optional
    serviceAccountAnnotations:
      iam.gke.io/gcp-service-account: "kubeagents-platform-gsa@kube-agents-gkedemos.iam.gserviceaccount.com"

  # Integration configures platform-specific external connections.
  # +optional
  integration:
    # GoogleChat configures the Google Chat integration.
    # +optional
    googleChat:
      # Enabled toggles the Google Chat integration.
      # Default: false
      # +optional
      enabled: true
      # Mode controls output verbosity in Google Chat ("default" or "debug").
      # Default: "default"
      # +optional
      mode: "default"
      # ProjectID is the target GCP Project ID for Pub/Sub. Required if enabled.
      # +optional
      projectId: "kube-agents-gkedemos"
      # Domain is the public HTTPS endpoint domain for Google Chat webhook routing.
      # +optional
      domain: "${GOOGLE_CHAT_DOMAIN}"
      # AppUrl is the public HTTPS webhook URL.
      # +optional
      appUrl: "https://${GOOGLE_CHAT_DOMAIN}/googlechat"
      # AppPrincipal is the required audience or service account ID.
      # +optional
      appPrincipal: "*"
      # AutoIngress automatically creates ManagedCertificate and Ingress.
      # +optional
      autoIngress: true
    # Slack configures the Slack integration.
    # +optional
    slack:
      # Enabled toggles the Slack integration.
      # Default: false
      # +optional
      enabled: false
      # BotToken is the Slack bot token (xoxb-...).
      # +optional
      botToken: ""
      # AppToken is the Slack app token for Socket Mode (xapp-...).
      # +optional
      appToken: ""
      # AllowedUsers is a list of allowed member IDs.
      # +optional
      allowedUsers: []
      # HomeChannel is the default channel ID for scheduled messages.
      # +optional
      homeChannel: ""
      # HomeChannelName is the human-readable channel name.
      # +optional
      homeChannelName: ""

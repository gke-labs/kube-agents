apiVersion: v1
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush         1
        Daemon        Off
        Log_Level     info
        Parsers_File  parsers.conf

    [INPUT]
        Name              tail
        Tag               agent.logs
        Path              /opt/data/logs/*.log
        DB                /fluent-bit/state/fluent-bit.db
        Refresh_Interval  5
        Rotate_Wait       30
        Mem_Buf_Limit     20MB
        Skip_Long_Lines   On
        Read_from_Head    On
        Path_Key          file_path

    [FILTER]
        Name          parser
        Match         agent.logs
        Key_Name      log
        Parser        gchat_event
        Reserve_Data  On
        Preserve_Key  On

    [FILTER]
        Name              record_modifier
        Match             agent.logs
        Record            app agent
        Record            log_source agent-file

    [OUTPUT]
        Name              stdout
        Match             agent.logs
        Format            json_lines
  parsers.conf: |
    [PARSER]
        Name    gchat_event
        Format  regex
        Regex   User=(?<gchat_user>[^,\s]+),\s*Session=(?<gchat_session>[^,\s]+)

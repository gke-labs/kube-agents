apiVersion: apps/v1
kind: Deployment
metadata:
  creationTimestamp: null
  labels:
    app: platformagent-credential-proxy
    kubeagents.x-k8s.io/agent: platformagent
    kubeagents.x-k8s.io/component: credential-proxy
  name: platformagent-credential-proxy
  namespace: kubeagents-system
  ownerReferences:
  - apiVersion: kubeagents.x-k8s.io/v1alpha1
    blockOwnerDeletion: true
    controller: true
    kind: PlatformAgent
    name: platformagent
    uid: ""
spec:
  replicas: 1
  selector:
    matchLabels:
      app: platformagent-credential-proxy
      kubeagents.x-k8s.io/agent: platformagent
      kubeagents.x-k8s.io/component: credential-proxy
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        kubeagents.x-k8s.io/policy-hash: ed79bb55a08861c97ed1169dce81c68352f3dbbdceb1506df9b438c4f7bc5d75
      creationTimestamp: null
      labels:
        app: platformagent-credential-proxy
        kubeagents.x-k8s.io/agent: platformagent
        kubeagents.x-k8s.io/component: credential-proxy
    spec:
      containers:
      - args:
        - /opt/hermes/.venv/bin/python3
        - /opt/defaults/scripts/credential_proxy.py
        env:
        - name: PLATFORM_AGENT_HOME
          value: /tmp/credential-proxy
        - name: HOME
          value: /tmp/credential-proxy/home
        - name: CREDENTIAL_PROXY_POLICY
          value: /etc/credential-proxy/policy.json
        - name: CREDENTIAL_PROXY_STATE_DIR
          value: /var/lib/credential-proxy
        - name: TOKEN_BROKER_URL
          value: http://github-token-minter.kubeagents-system.svc.cluster.local:8080/token
        - name: GOOGLE_CHAT_PROJECT_ID
          value: kube-agents-gkedemos
        - name: GOOGLE_CHAT_SUBSCRIPTION_NAME
          value: projects/kube-agents-gkedemos/subscriptions/kubeagents-google-chat-events-sub
        image: ghcr.io/gke-labs/kube-agents/credential-proxy
        imagePullPolicy: IfNotPresent
        name: credential-proxy
        ports:
        - containerPort: 8765
          name: http
        readinessProbe:
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 2
          periodSeconds: 5
        resources:
          limits:
            cpu: "2"
            ephemeral-storage: 2Gi
            memory: 2Gi
          requests:
            cpu: 100m
            memory: 256Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
        volumeMounts:
        - mountPath: /etc/credential-proxy/policy.json
          name: policy
          readOnly: true
          subPath: policy.json
        - mountPath: /tmp
          name: tmp
        - mountPath: /var/lib/credential-proxy
          name: state
      securityContext:
        fsGroup: 10000
        runAsNonRoot: true
        runAsUser: 10000
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: kubeagents-platform-agent
      volumes:
      - configMap:
          name: platformagent-credential-proxy-policy
        name: policy
      - emptyDir:
          sizeLimit: 2Gi
        name: tmp
      - emptyDir:
          sizeLimit: 5Gi
        name: state
status: {}

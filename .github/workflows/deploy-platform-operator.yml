name: Deploy Platform Operator

on:
  push:
    branches: [main]
    paths:
      - "integrations/operators/platform/**"
      - ".github/workflows/deploy-platform-operator.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target GitHub Environment'
        required: true
        default: 'development'
        type: choice
        options:
          - development
          - production

permissions:
  contents: 'read'
  id-token: 'write'

env:
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  GCP_PROJECT_NUMBER: ${{ vars.GCP_PROJECT_NUMBER }}
  GKE_REGION: ${{ vars.GCP_REGION || 'us-central1' }}

jobs:
  deploy:
    environment: ${{ inputs.environment || 'development' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          token_format: 'access_token'
          workload_identity_provider: 'projects/${{ env.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'gha-deployer@${{ env.GCP_PROJECT_ID }}.iam.gserviceaccount.com'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Trigger Cloud Build
        run: |
          gcloud builds submit \
            --config=integrations/operators/platform/cloudbuild.yaml \
            --project=${{ env.GCP_PROJECT_ID }} \
            integrations/operators/platform/

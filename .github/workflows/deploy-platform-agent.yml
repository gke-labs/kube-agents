name: Deploy Platform Agent

on:
  push:
    branches: [main]
    paths:
      - "k8s-operator/**"
      - "agents/**"
      - "deploy/docker/**"
      - "deploy/shared/**"
      - "tags.env"
      - ".github/workflows/deploy-platform-agent.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # Required to fetch OIDC tokens from GitHub
  packages: write # Required to push to GHCR

env:
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  GCP_REGION: ${{ vars.GCP_REGION }}
  GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
  GCP_SERVICE_ACCOUNT: ${{ vars.GCP_SERVICE_ACCOUNT }}
  GKE_CLUSTER_NAME: ${{ vars.GKE_CLUSTER_NAME }}
  MODEL_DEFAULT_NAME: ${{ vars.MODEL_DEFAULT_NAME }}
  MODEL_PROVIDER: ${{ vars.MODEL_PROVIDER }}

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      controller: ${{ steps.filter.outputs.controller }}
      agent: ${{ steps.filter.outputs.agent }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Check for path changes
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            controller:
              - 'k8s-operator/**'
              - '.github/workflows/deploy-platform-agent.yml'
            agent:
              - 'agents/shared/**'
              - 'agents/platform/**'
              - 'deploy/docker/**'
              - 'deploy/shared/**'
              - 'tags.env'
              - '.github/workflows/deploy-platform-agent.yml'

  deploy-operator:
    needs: changes
    if: ${{ needs.changes.outputs.controller == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    environment: staging
    env:
      IMAGE_NAME: platform-agent-operator
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "k8s-operator/go.mod"

      - name: Authenticate to Google Cloud via WIF
        id: auth
        uses: google-github-actions/auth@v3
        with:
          token_format: "access_token"
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Get Short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build and Push Operator Image
        uses: docker/build-push-action@v7
        with:
          context: k8s-operator
          file: k8s-operator/Dockerfile
          push: true
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/${{ github.repository }}/${{ env.IMAGE_NAME }}:latest
            ghcr.io/${{ github.repository }}/${{ env.IMAGE_NAME }}:sha-${{ steps.vars.outputs.sha_short }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Authenticate to GKE
        uses: google-github-actions/get-gke-credentials@v3
        with:
          cluster_name: ${{ env.GKE_CLUSTER_NAME }}
          location: ${{ env.GCP_REGION }}
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Redeploy Operator + CRDs (make deploy)
        run: |
          cd k8s-operator
          make deploy IMG="ghcr.io/${{ github.repository }}/${{ env.IMAGE_NAME }}:sha-${{ steps.vars.outputs.sha_short }}"
          kubectl rollout status deployment/kubeagents-controller-manager -n kubeagents-system --timeout=90s

  deploy-agent:
    needs: [changes, deploy-operator]
    if: |
      !cancelled() &&
      needs.changes.result == 'success' &&
      (needs.changes.outputs.agent == 'true' || needs.changes.outputs.controller == 'true' || github.event_name == 'workflow_dispatch') &&
      (needs.deploy-operator.result == 'success' || needs.deploy-operator.result == 'skipped')
    runs-on: ubuntu-latest
    environment: staging
    env:
      IMAGE_NAME: platform-agent
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Load tags
        run: cat tags.env >> "$GITHUB_ENV"

      - name: Authenticate to Google Cloud via WIF
        id: auth
        uses: google-github-actions/auth@v3
        with:
          token_format: "access_token"
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Get Short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build and Push Agent Image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deploy/docker/Dockerfile # Path to new central Dockerfile
          target: platform # Specify the target stage in multi-stage build
          push: true
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            HERMES_AGENT_TAG=${{ env.HERMES_AGENT_TAG }}
          tags: |
            ghcr.io/${{ github.repository }}/${{ env.IMAGE_NAME }}:latest
            ghcr.io/${{ github.repository }}/${{ env.IMAGE_NAME }}:sha-${{ steps.vars.outputs.sha_short }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Authenticate to GKE
        uses: google-github-actions/get-gke-credentials@v3
        with:
          cluster_name: ${{ env.GKE_CLUSTER_NAME }}
          location: ${{ env.GCP_REGION }}
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Update Platform Agent Image & Wait for Rollout
        run: |
          IMAGE_REPO="ghcr.io/${{ github.repository }}/${{ env.IMAGE_NAME }}"
          IMAGE_TAG="sha-${{ steps.vars.outputs.sha_short }}"
          MODEL_SPEC="{\"default\":\"${{ env.MODEL_DEFAULT_NAME }}\",\"provider\":\"${{ env.MODEL_PROVIDER }}\"}"

          echo "Patching PlatformAgent custom resource with new image: $IMAGE_REPO:$IMAGE_TAG"
          kubectl patch platformagent.kubeagents.x-k8s.io platform-agent \
            -n kubeagents-system \
            --type='merge' \
            -p "{\"spec\":{\"deployment\":{\"image\":\"$IMAGE_REPO\",\"tag\":\"$IMAGE_TAG\"},\"model\":$MODEL_SPEC}}"

          echo "Waiting for rollout of platform-agent-gateway..."
          kubectl rollout status deployment/platform-agent-gateway -n kubeagents-system --timeout=180s

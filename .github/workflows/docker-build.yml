name: Docker Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Get Tag from Makefile
        id: get_tag
        run: |
          TAG="$(grep "^HERMES_AGENT_TAG" Makefile | cut -d= -f2 | tr -d ' ')"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build DevTeam Agent
        uses: docker/build-push-action@v7
        with:
          context: .
          file: agents/devteam/Dockerfile
          push: false
          tags: devteam-agent:latest
          build-args: |
            HERMES_AGENT_TAG=${{ steps.get_tag.outputs.tag }}

      - name: Build Operator Agent
        uses: docker/build-push-action@v7
        with:
          context: .
          file: agents/operator/Dockerfile
          push: false
          tags: operator-agent:latest
          build-args: |
            HERMES_AGENT_TAG=${{ steps.get_tag.outputs.tag }}

      - name: Build Platform Agent
        uses: docker/build-push-action@v7
        with:
          context: .
          file: agents/platform/Dockerfile
          push: false
          tags: platform-agent:latest
          build-args: |
            HERMES_AGENT_TAG=${{ steps.get_tag.outputs.tag }}

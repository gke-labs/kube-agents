# Cluster-admin tier — pre-created read-only identity (06 §2, 03 §4).
# Cluster-scoped read-only. One per cluster. Controller references, never mints (08 §4).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cluster-admin-agent
  namespace: kubeagents-system
  labels:
    kube-agents/tier: cluster-admin
    app.kubernetes.io/managed-by: gitops
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cluster-admin-agent-explorer
  labels:
    kube-agents/tier: cluster-admin
rules:
  - apiGroups:
      ["", "apps", "batch", "networking.k8s.io", "rbac.authorization.k8s.io"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cluster-admin-agent-explorer
  labels:
    kube-agents/tier: cluster-admin
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin-agent-explorer
subjects:
  - kind: ServiceAccount
    name: cluster-admin-agent
    namespace: kubeagents-system

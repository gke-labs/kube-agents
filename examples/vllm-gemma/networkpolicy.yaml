apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: vllm-policy
  namespace: agent-system
spec:
  podSelector:
    matchLabels:
      app: gemma-server
  policyTypes:
    - Ingress
    - Egress
  egress:
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
      to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
    - ports:
        - port: 443
          protocol: TCP
      to:
        - ipBlock:
            cidr: 0.0.0.0/0

  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: platform-agent
        - podSelector:
            matchLabels:
              app: platform-agent-gateway
        - podSelector:
            matchLabels:
              group: operator-agent
        - podSelector:
            matchLabels:
              group: devteam-agent
      ports:
        - port: 8000
          protocol: TCP
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: gke-gmp-system
      ports:
        - port: 8000
          protocol: TCP

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: vllm-policy
  namespace: agent-system
spec:
  podSelector:
    matchLabels:
      app: gemma-server
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: platform-agent
        - podSelector:
            matchLabels:
              group: operator-agent
        - podSelector:
            matchLabels:
              group: devteam-agent
      ports:
        - port: 8000
          protocol: TCP
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: gke-gmp-system
      ports:
        - port: 8000
          protocol: TCP

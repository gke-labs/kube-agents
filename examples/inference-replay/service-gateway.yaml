apiVersion: v1
kind: Service
metadata:
  name: litellm-gateway # New service name for the original LiteLLM gateway
  namespace: kubeagents-system
spec:
  selector:
    app: litellm # Routes to the original LiteLLM deployment
  ports:
    - protocol: TCP
      port: 80
      targetPort: 4000
  type: ClusterIP

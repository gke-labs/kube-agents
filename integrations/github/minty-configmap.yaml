apiVersion: v1
kind: ConfigMap
metadata:
  name: github-token-minter-config
  namespace: agent-system
data:
  dshnayder-infra.yaml: |
    version: 'minty.abcxyz.dev/v2'
    rule:
      if: "assertion.iss == 'https://container.googleapis.com/v1/projects/agentic-harness-demo/locations/us-central1/clusters/agentic-harness-management'"
    scope:
      platform-agent-scope:
        rule:
          if: "assertion.sub == 'system:serviceaccount:agent-system:platform-agent'"
        repositories:
          - 'infra'
        permissions:
          contents: 'write'
          pull_requests: 'write'

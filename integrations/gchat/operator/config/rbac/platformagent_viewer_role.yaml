# This rule is not used by the project platform-agent-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to agent.platform.io resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: platform-agent-operator
    app.kubernetes.io/managed-by: kustomize
  name: platformagent-viewer-role
rules:
  - apiGroups:
      - agent.platform.io
    resources:
      - platformagents
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - agent.platform.io
    resources:
      - platformagents/status
    verbs:
      - get

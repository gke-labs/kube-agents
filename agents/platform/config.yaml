# MCP Servers configuration.
mcp_servers:
  platform_control:
    command: "python3"
    args: ["/opt/data/scripts/platform_mcp_server.py"]
    connect_timeout: 120
    # 5-minute timeout to support long GKE reasoning chains
    timeout: 300


# Explicitly list platform_toolsets
platform_toolsets:
  cli:
    - hermes-cli
    - mcp-developer_knowledge
    - mcp-platform_control
  api_server:
    - hermes-api-server
    - mcp-developer_knowledge
    - mcp-platform_control

apiVersion: v1
kind: Namespace
metadata:
  name: agent-system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: platform-agent
  namespace: agent-system
---
# ── Wildcard Management K8s RBAC ClusterRole for Platform Custodian ──────────
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: platform-agent-role
rules:
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: platform-agent-rolebinding
subjects:
  - kind: ServiceAccount
    name: platform-agent
    namespace: agent-system
roleRef:
  kind: ClusterRole
  name: platform-agent-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-agent
  namespace: agent-system
  labels:
    app: platform-agent
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: platform-agent
  template:
    metadata:
      labels:
        app: platform-agent
    spec:
      # Configure the pod to run under its dedicated Service Account
      serviceAccountName: platform-agent
      securityContext:
        # Ensure the non-root container user can write to the persistent volume
        fsGroup: 10000
      containers:
        - name: platform-agent
          image: us-central1-docker.pkg.dev/agentic-harness-demo/demo/platform-agent:yolo
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
              # Required by s6-overlay to drop privileges to the non-root user
              add:
                - SETUID
                - SETGID
          ports:
            - containerPort: 8642
              name: api
            - containerPort: 9119
              name: dashboard
            - containerPort: 8699
              name: kv-store
          resources:

            requests:
              cpu: "2"
              memory: "2Gi"
            limits:
              cpu: "4"
              memory: "4Gi"
          env:
            - name: API_SERVER_ENABLED
              value: "true"
            - name: HERMES_DASHBOARD
              value: "1"
            - name: API_SERVER_HOST
              value: "0.0.0.0"
            - name: API_SERVER_KEY
              valueFrom:
                secretKeyRef:
                  name: platform-agent-secrets
                  key: api-server-key
            - name: SWARM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: platform-agent-secrets
                  key: api-server-key
            - name: YOLO_MODE
              value: "true"
            - name: GOOGLE_CHAT_PROJECT_ID
              value: "agentic-harness-demo"
            - name: GOOGLE_CHAT_SUBSCRIPTION_NAME
              value: "projects/agentic-harness-demo/subscriptions/platform-agent-chat-events-sub"
            - name: GOOGLE_CHAT_SERVICE_ACCOUNT_JSON
              value: ""
            - name: MODEL_NAME
              value: "model-default"
            - name: MODEL_BASE_URL
              value: "http://litellm.agent-system.svc.cluster.local/v1"
            - name: MODEL_API_KEY
              value: "none"
            - name: SESSION_RESOLVER_URL
              value: "http://localhost:8699"
            - name: PYTHONPATH
              value: "/opt/data/python_overrides"
          volumeMounts:
            - name: data-volume
              mountPath: /opt/data
            - name: settings-volume
              mountPath: /opt/data/SETTINGS.md
              subPath: SETTINGS.md
            - name: run-volume
              mountPath: /run
      volumes:
        - name: data-volume
          persistentVolumeClaim:
            claimName: platform-agent-pvc
        - name: settings-volume
          configMap:
            name: platform-agent-settings
        - name: run-volume
          emptyDir: {}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: platform-agent-pvc
  namespace: agent-system
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: platform-agent-settings
  namespace: agent-system
data:
  SETTINGS.md: |
    # GKE Harness Settings
    - **Target Repository:** https://github.com/your-org/your-infra-repo
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: platform-agent-policy
  namespace: agent-system
spec:
  podSelector:
    matchLabels:
      app: platform-agent
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - ipBlock:
        cidr: 0.0.0.0/0
    ports:
    - port: 8644
      protocol: TCP
    - port: 8642
      protocol: TCP
  - from:
    - podSelector:
        matchLabels:
          group: operator-agent
    - podSelector:
        matchLabels:
          group: devteam-agent
    ports:
    - port: 8699
      protocol: TCP
    - port: 8642
      protocol: TCP
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
      podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
    - port: 53
      protocol: UDP
    - port: 53
      protocol: TCP
  - to:
    - podSelector:
        matchLabels:
          app: litellm
    ports:
    - port: 80
      protocol: TCP
    - port: 4000
      protocol: TCP
  - to:
    - podSelector:
        matchLabels:
          group: operator-agent
    - podSelector:
        matchLabels:
          group: devteam-agent
    ports:
    - port: 8642
      protocol: TCP
    - port: 8644
      protocol: TCP
  - to:
    - podSelector:
        matchLabels:
          app: github-token-minter
    ports:
    - port: 8080
      protocol: TCP
  - to:
    - ipBlock:
        cidr: 0.0.0.0/0
    ports:
    - port: 443
      protocol: TCP
    - port: 80
      protocol: TCP

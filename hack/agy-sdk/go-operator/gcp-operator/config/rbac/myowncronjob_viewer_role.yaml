# This rule is not used by the project gcp-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to batch.mycompany.com resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: gcp-operator
    app.kubernetes.io/managed-by: kustomize
  name: myowncronjob-viewer-role
rules:
- apiGroups:
  - batch.mycompany.com
  resources:
  - myowncronjobs
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - batch.mycompany.com
  resources:
  - myowncronjobs/status
  verbs:
  - get

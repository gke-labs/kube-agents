apiVersion: v1
kind: Service
metadata:
  name: platform-agent
  namespace: kubeagents-system
spec:
  selector:
    app: platform-agent-gateway
  ports:
    - name: api
      protocol: TCP
      port: 8642
      targetPort: 8642
    - name: dashboard
      protocol: TCP
      port: 9119
      targetPort: 9119
    - name: kv-store
      protocol: TCP
      port: 8699
      targetPort: 8699
    - name: webhook
      protocol: TCP
      port: 8644
      targetPort: 8644
  type: ClusterIP

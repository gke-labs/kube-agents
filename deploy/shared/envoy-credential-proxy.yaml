static_resources:
  listeners:
    - name: credential_proxy
      address:
        socket_address:
          address: 127.0.0.1
          port_value: 8765
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: credential_proxy
                route_config:
                  name: credential_proxy
                  virtual_hosts:
                    - name: credential_proxy
                      domains: ["*"]
                      routes:
                        - match: { prefix: "/" }
                          route:
                            cluster: credential_runtime
                            timeout: 0s
                http_filters:
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
  clusters:
    - name: credential_runtime
      connect_timeout: 1s
      type: STATIC
      load_assignment:
        cluster_name: credential_runtime
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    pipe:
                      path: /var/run/credential-proxy/backend.sock

admin:
  address:
    pipe:
      path: /var/run/credential-proxy/envoy-admin.sock
